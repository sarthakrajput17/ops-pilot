apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: ops-pilot

  labels:
    app: postgres
    component: database

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres
      component: database

  template:
    metadata:
      labels:
        app: postgres
        component: database

    spec:
      containers:
        - name: postgres

          image: postgres:16.10
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: POSTGRES_DB
              value: devopsdb

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ops-pilot-secret
                  key: DB_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ops-pilot-secret
                  key: DB_PASSWORD

          ports:
            - containerPort: 5432

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres

            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres

            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service

metadata:
  name: postgres
  namespace: ops-pilot

  labels:
    app: postgres
    component: database

spec:
  selector:
    app: postgres
    component: database

  ports:
    - port: 5432
      targetPort: 5432

  type: ClusterIP